schemaVersion: 2.2.0
metadata:
  name: springboot-mcp-bootstrap-env
components:
  # 1. Contenedor de Desarrollo (IDE + Java 21)
  - name: java-runtime
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      mountSources: true
      memoryLimit: 3Gi
      cpuLimit: 2000m

  # 2. Tu Servidor MCP como Sidecar (Node.js)
  - name: mcp-server-sidecar
    container:
      image: quay.io/jcepedav/mcp-server:latest
      mountSources: true # Compartir /projects para que pueda crear archivos
      memoryLimit: 512Mi
      cpuLimit: 300m
      env:
        - name: PORT
          value: "3000"
        # 4. Configuración del MCP para que sepa dónde encontrar los proyectos (NO USAR en DevSpaces variable protegida, dependiendo de tu implementación)
        # Si tu servidor MCP necesita acceso a los proyectos, puedes montar el mismo volumen y configurar la ruta
#        - name: PROJECTS_ROOT
#          value: "/projects"
      endpoints:
        - name: mcp-sse
          targetPort: 3000
          exposure: public
          protocol: https

commands:
  # 3. Comando para inyectar la configuración del MCP en VS Code
  - id: auto-configure-mcp
    exec:
      component: java-runtime
      commandLine: |
        # Ruta de configuración de usuario en VS Code remoto
        CONFIG_DIR="/home/user/.vscode-remote/data/User"
        mkdir -p $CONFIG_DIR

        MCP_URL="http://localhost:3000/sse"

        # Formato mcp.json de usuario (estandar)
        cat > $CONFIG_DIR/mcp.json << EOF
        {
          "servers": {
            "bootstrap-tool": {
              "type": "sse",
              "url": "$MCP_URL"
            }
          }
        }
        EOF

        echo "✅ MCP Server configurado con URL pública: $MCP_URL"

events:
  # Se ejecuta automáticamente al levantar el workspace
  postStart:
    - auto-configure-mcp